.tarot-card::before {

/* ─── Theme ─── */
.theme-grid {

<script>
/* ── Data ── */
const ZODIACS = [

  { sym:'♑', name:'山羊座', en:'Capricorn',    period:'12/22-1/19' },
  { sym:'♒', name:'水瓶座', en:'Aquarius',     period:'1/20-2/18' },
  { sym:'♓', name:'魚座',   en:'Pisces',       period:'2/19-3/20' }

const TAROT = [
  { glyph:'☀', name:'太陽',        upright:true },
  { glyph:'☾', name:'月',          upright:false },
  { glyph:'⭐', name:'星',          upright:true },
  { glyph:'⚡', name:'塔',          upright:false },
  { glyph:'⚖', name:'正義',        upright:true },
  { glyph:'∞', name:'世界',        upright:true },
  { glyph:'♡', name:'恋人',        upright:true },
  { glyph:'◈', name:'女魔法使い',   upright:true },
  { glyph:'⚔', name:'剣のエース',  upright:true },
  { glyph:'✦', name:'コインの10',  upright:true },
  { glyph:'❋', name:'運命の輪',    upright:false },
  { glyph:'🜁', name:'隠者',       upright:true },
  { glyph:'▲', name:'審判',        upright:true },
  { glyph:'◉', name:'戦車',        upright:true },
  { glyph:'♾', name:'力',          upright:true }
];

const THEMES = [
  { icon:'♡', name:'恋愛・縁',    desc:'出逢いと結びつき' },
  { icon:'✦', name:'仕事・才能',  desc:'使命と成長の道' },
  { icon:'◯', name:'金運・豊かさ', desc:'物質とエネルギー' },
  { icon:'∞', name:'魂・本質',    desc:'内なる声を聞く' }
];

const TAB_LABELS = {
  daily: '今日の総合運',
  love:  '恋愛運',
  work:  '仕事・使命運',
  spirit:'魂の道'
};

const LUCKY_COLORS  = ['深紅','インディゴ','ゴールド','ミッドナイトブルー','アメジスト','パールホワイト','ラピスラズリ'];
const LUCKY_DIRS    = ['北北西','南東','東','西南西','北東','真南','北'];

/* ── State ── */
let selectedZodiac = null;
let drawnCards     = [];
let selectedTheme  = null;
let currentTab     = 'daily';

/* ── Stars canvas ── */
(function initStars(){
  const canvas = document.getElementById('canvas-stars');
  const ctx    = canvas.getContext('2d');
  let stars    = [];

  function resize(){
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    stars = Array.from({length:120}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      speed: Math.random() * 0.3 + 0.05,
      phase: Math.random() * Math.PI * 2
    }));
  }

  function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    stars.forEach(s => {
      const alpha = 0.2 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
})();

/* ── Init grids ── */
function initZodiac(){
  const g = document.getElementById('zodiacGrid');
  ZODIACS.forEach((z,i) => {
    const b = document.createElement('button');
    b.className = 'zodiac-btn';
    b.setAttribute('aria-label', z.name);
    b.innerHTML = `<span class="zodiac-sym">${z.sym}</span><span class="zodiac-name">${z.name}</span>`;
    b.onclick = () => selectZodiac(i);
    g.appendChild(b);
  });
}

function initTarot(){
  const d = document.getElementById('tarotDeck');
  for(let i=0; i<5; i++){
    const c = document.createElement('div');
    c.className = 'tarot-card';
    c.id = 'tc'+i;
    d.appendChild(c);
  }
}

function initThemes(){
  const g = document.getElementById('themeGrid');
  THEMES.forEach((t,i) => {
    const b = document.createElement('button');
    b.className = 'theme-btn';
    b.innerHTML = `<span class="theme-icon">${t.icon}</span><div class="theme-name">${t.name}</div><div class="theme-desc">${t.desc}</div>`;
    b.onclick = () => selectTheme(i,b);
    g.appendChild(b);
  });
}

/* ── Tab ── */
function setTab(tab, el){
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
}

/* ── Enable / Disable ── */
function enable(id){
  const el = document.getElementById(id);
  el.classList.remove('disabled');
}
function disable(id){
  const el = document.getElementById(id);
  el.classList.add('disabled');
}
function setDot(id, cls){
  const el = document.getElementById(id);
  el.className = 'step-dot ' + cls;
}

/* ── Zodiac select ── */
function selectZodiac(idx){
  selectedZodiac = idx;
  document.querySelectorAll('.zodiac-btn').forEach((b,i) => b.classList.toggle('selected', i===idx));
  setDot('dot1','done');
  setDot('dot2','active');
  enable('step2');
  drawnCards = [];
  document.querySelectorAll('.tarot-card').forEach(c => { c.classList.remove('flipped'); c.innerHTML=''; });
  document.getElementById('drawBtn').disabled = false;
  disable('step3');
  disable('step4');
  document.getElementById('resultArea').classList.remove('visible');
}

/* ── Draw cards ── */
function drawCards(){
  const shuffled = [...TAROT].sort(() => Math.random()-0.5);
  drawnCards = shuffled.slice(0,3);
  const roles = ['過去','現在','未来'];

  document.querySelectorAll('.tarot-card').forEach(c => { c.classList.remove('flipped'); c.innerHTML=''; });

  drawnCards.forEach((card,i) => {
    setTimeout(() => {
      const el = document.getElementById('tc'+i);
      el.innerHTML = `<div class="card-inner">
        <div class="card-glyph">${card.glyph}</div>
        <div class="card-label">${card.name}<br>${card.upright?'正位置':'逆位置'}</div>
        <div class="card-role">${roles[i]}</div>
      </div>`;
      el.classList.add('flipped');
    }, i*350);
  });

  document.getElementById('drawBtn').disabled = true;

  setTimeout(() => {
    setDot('dot2','done');
    setDot('dot3','active');
    enable('step3');
  }, 1400);
}

/* ── Theme select ── */
function selectTheme(idx, btn){
  selectedTheme = idx;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  setDot('dot3','done');
  setDot('dot4','active');
  enable('step4');
  document.getElementById('readingBtn').disabled = false;
}

/* ── Reading ── */
async function startReading(){
  const z     = ZODIACS[selectedZodiac];
  const theme = THEMES[selectedTheme];
  const roles = ['過去','現在','未来'];
  const cardDesc = drawnCards.map((c,i)=>`${roles[i]}：${c.name}（${c.upright?'正位置':'逆位置'}）`).join('、');
  const today = new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  document.getElementById('resultArea').classList.add('visible');
  document.getElementById('resultContent').innerHTML = `
    <div class="loading-box">
      <div class="orb"></div>
      <p class="loading-text">天空の声を受信しています...</p>
    </div>`;
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});

  const prompt = `あなたは深遠で神秘的な星占い・タロット鑑定師です。詩的かつ具体的に、温かみのある文体で日本語で鑑定してください。

【星座】${z.name}（${z.en}）
【テーマ】${theme.name} ／ ${TAB_LABELS[currentTab]}
【タロット3枚】${cardDesc}
【鑑定日】${today}

以下の構成で250〜300字程度の鑑定文を書いてください：
1. 「${z.sym} ${z.name}へ」で始める
2. タロット3枚（過去→現在→未来）を星座の特性と絡めて読む
3. ${theme.name}に関する具体的なメッセージ
4. 今日を生きるためのひとこと

占い師の語りかけとして自然に、詩的で神秘的に。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': ANTHROPIC_API_KEY,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role:'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data.content?.map(b => b.text||'').join('') || '鑑定文を取得できませんでした。';

    const scores = {
      '総合運': 60 + Math.floor(Math.random()*35),
      '恋愛':   55 + Math.floor(Math.random()*40),
      '仕事':   50 + Math.floor(Math.random()*45),
      '金運':   45 + Math.floor(Math.random()*50)
    };

    const lColor = LUCKY_COLORS[Math.floor(Math.random()*LUCKY_COLORS.length)];
    const lNum   = Math.floor(Math.random()*9)+1;
    const lDir   = LUCKY_DIRS[Math.floor(Math.random()*LUCKY_DIRS.length)];

    document.getElementById('resultContent').innerHTML = `
      <div class="result-header">
        <div class="result-zodiac-sym">${z.sym}</div>
        <div class="result-title">${z.name} ∣ ${TAB_LABELS[currentTab]}</div>
        <div class="result-date">${today}</div>
      </div>

      <div class="result-cards">
        ${drawnCards.map((c,i)=>`
          <div class="result-chip">
            <div class="chip-role">${roles[i]}</div>
            <div class="chip-name">${c.glyph} ${c.name}</div>
          </div>`).join('')}
      </div>

      <div class="result-text">${text}</div>

      <hr class="divider">

      <div class="lucky-row">
        <div class="lucky-item"><div class="lucky-key">ラッキーカラー</div><div class="lucky-val">${lColor}</div></div>
        <div class="lucky-item"><div class="lucky-key">ラッキーナンバー</div><div class="lucky-val">${lNum}</div></div>
        <div class="lucky-item"><div class="lucky-key">吉方位</div><div class="lucky-val">${lDir}</div></div>
      </div>

      <hr class="divider">

      <div class="score-section">
        ${Object.entries(scores).map(([k,v])=>`
          <div class="score-row">
            <div class="score-key">${k}</div>
            <div class="score-track"><div class="score-fill" style="width:0%" data-w="${v}%"></div></div>
            <div class="score-num">${v}</div>
          </div>`).join('')}
      </div>

      <div class="share-cta">
        <p>今日の鑑定結果をInstagramで保存しよう</p>
        <a class="share-btn" href="https://instagram.com/counseling_room_tomorrow" target="_blank" rel="noopener">
          ✦ @counseling_room_tomorrow をフォロー
        </a>
      </div>
    `;

    /* Animate score bars */
    setTimeout(() => {
      document.querySelectorAll('.score-fill').forEach(el => {
        el.style.width = el.dataset.w;
      });
    }, 100);

  } catch(e) {
    document.getElementById('resultContent').innerHTML = `
      <p style="text-align:center;color:var(--text-muted);font-size:13px;line-height:2">
        接続エラーが発生しました。<br>
        APIキーの設定を確認してから、もう一度お試しください。<br>
        <small style="color:var(--text-faint);font-size:11px">${e.message}</small>
      </p>`;
  }
}

/* ── Boot ── */
initZodiac();
initTarot();
initThemes();
</script>
</body>
</html>
