/* ── その他データ ── */
const ZODIACS = [

const TAROT = [

];
const THEMES = [

];
const LUCKY_COLORS = ['深紅','インディゴ','ゴールド','ミッドナイトブルー','アメジスト','パールホワイト','ラピスラズリ'];
const LUCKY_DIRS   = ['北北西','南東','東','西南西','北東','真南','北'];
const TAB_LABELS   = {daily:'今日の総合運',love:'恋愛運',work:'仕事・使命運',spirit:'魂の道'};

/* ── State ── */
let selectedZodiac = null, drawnCards = [], selectedTheme = null, currentTab = 'daily';

/* ── Stars ── */
(function(){
  const canvas = document.getElementById('canvas-stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = Array.from({length:120}, () => ({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height,
      r: Math.random()*1.2+0.2, speed: Math.random()*0.3+0.05, phase: Math.random()*Math.PI*2
    }));
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t = Date.now()/1000;
    stars.forEach(s => {
      const a = 0.2 + 0.6*(0.5+0.5*Math.sin(t*s.speed+s.phase));
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', resize); resize(); draw();
})();

/* ── Init ── */
function initZodiac(){
  const g = document.getElementById('zodiacGrid');
  ZODIACS.forEach((z,i) => {
    const b = document.createElement('button');
    b.className = 'zodiac-btn';
    b.innerHTML = `<span class="zodiac-sym">${z.sym}</span><span class="zodiac-name">${z.name}</span>`;
    b.onclick = () => selectZodiac(i); g.appendChild(b);
  });
}
function initTarot(){
  const d = document.getElementById('tarotDeck');
  for(let i=0;i<5;i++){
    const c = document.createElement('div');
    c.className='tarot-card'; c.id='tc'+i; d.appendChild(c);
  }
}
function initThemes(){
  const g = document.getElementById('themeGrid');
  THEMES.forEach((t,i) => {
    const b = document.createElement('button');
    b.className='theme-btn';
    b.innerHTML = `<span class="theme-icon">${t.icon}</span><div class="theme-name">${t.name}</div><div class="theme-desc">${t.desc}</div>`;
    b.onclick = () => selectTheme(i,b); g.appendChild(b);
  });
}
function setTab(tab,el){
  currentTab=tab;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}
function enable(id){ document.getElementById(id).classList.remove('disabled'); }
function disable(id){ document.getElementById(id).classList.add('disabled'); }
function setDot(id,cls){ document.getElementById(id).className='step-dot '+cls; }

function selectZodiac(idx){
  selectedZodiac=idx;
  document.querySelectorAll('.zodiac-btn').forEach((b,i)=>b.classList.toggle('selected',i===idx));
  setDot('dot1','done'); setDot('dot2','active'); enable('step2');
  drawnCards=[];
  document.querySelectorAll('.tarot-card').forEach(c=>{c.classList.remove('flipped');c.innerHTML='';});
  document.getElementById('drawBtn').disabled=false;
  disable('step3'); disable('step4');
  document.getElementById('resultArea').classList.remove('visible');
}

function drawCards(){
  const shuffled = [...TAROT].sort(()=>Math.random()-0.5);
  drawnCards = shuffled.slice(0,3);
  const roles = ['過去','現在','未来'];
  document.querySelectorAll('.tarot-card').forEach(c=>{c.classList.remove('flipped');c.innerHTML='';});
  drawnCards.forEach((card,i) => {
    setTimeout(()=>{
      const el = document.getElementById('tc'+i);
      el.innerHTML = `<div class="card-inner"><div class="card-glyph">${card.glyph}</div><div class="card-label">${card.name}<br>${card.upright?'正位置':'逆位置'}</div><div class="card-role">${roles[i]}</div></div>`;
      el.classList.add('flipped');
    }, i*350);
  });
  document.getElementById('drawBtn').disabled=true;
  setTimeout(()=>{ setDot('dot2','done'); setDot('dot3','active'); enable('step3'); }, 1400);
}

function selectTheme(idx,btn){
  selectedTheme=idx;
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  setDot('dot3','done'); setDot('dot4','active'); enable('step4');
  document.getElementById('readingBtn').disabled=false;
}

function startReading(){
  const z     = ZODIACS[selectedZodiac];
  const theme = THEMES[selectedTheme];
  const roles = ['過去','現在','未来'];
  const today = new Date();
  const dow   = today.getDay(); // 0=日,1=月,...,6=土
  const dateStr = today.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});

  // 鑑定文取得（曜日インデックスで選択）
  const themeKey = theme.key;
  const text = READINGS[selectedZodiac][themeKey][dow];

  const scores = {
    '総合運': 60+Math.floor(Math.random()*35),
    '恋愛':   55+Math.floor(Math.random()*40),
    '仕事':   50+Math.floor(Math.random()*45),
    '金運':   45+Math.floor(Math.random()*50)
  };
  const lColor = LUCKY_COLORS[Math.floor(Math.random()*LUCKY_COLORS.length)];
  const lNum   = Math.floor(Math.random()*9)+1;
  const lDir   = LUCKY_DIRS[Math.floor(Math.random()*LUCKY_DIRS.length)];

  document.getElementById('resultArea').classList.add('visible');
  document.getElementById('resultContent').innerHTML = `
    <div class="result-header">
      <div class="result-zodiac-sym">${z.sym}</div>
      <div class="result-title">${z.name} ∣ ${TAB_LABELS[currentTab]}</div>
      <div class="result-date">${dateStr}</div>
    </div>
    <div class="result-cards">
      ${drawnCards.map((c,i)=>`<div class="result-chip"><div class="chip-role">${roles[i]}</div><div class="chip-name">${c.glyph} ${c.name}</div></div>`).join('')}
    </div>
    <div class="result-text">${text}</div>
    <hr class="divider">
    <div class="lucky-row">
      <div><div class="lucky-key">ラッキーカラー</div><div class="lucky-val">${lColor}</div></div>
      <div><div class="lucky-key">ラッキーナンバー</div><div class="lucky-val">${lNum}</div></div>
      <div><div class="lucky-key">吉方位</div><div class="lucky-val">${lDir}</div></div>
    </div>
    <hr class="divider">
    ${Object.entries(scores).map(([k,v])=>`
      <div class="score-row">
        <div class="score-key">${k}</div>
        <div class="score-track"><div class="score-fill" style="width:0%" data-w="${v}%"></div></div>
        <div class="score-num">${v}</div>
      </div>`).join('')}
    <div class="share-cta">
      <p>今日の鑑定結果をInstagramで保存しよう</p>
      <a class="share-btn" href="https://instagram.com/counseling_room_tomorrow" target="_blank" rel="noopener">✦ @counseling_room_tomorrow をフォロー</a>
    </div>
  `;
  document.getElementById('resultArea').scrollIntoView({behavior:'smooth',block:'start'});
  setTimeout(()=>{ document.querySelectorAll('.score-fill').forEach(el=>{ el.style.width=el.dataset.w; }); }, 100);
}

initZodiac(); initTarot(); initThemes();
</script>
